spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-streamer-a
  template:
    metadata:
      labels:
        app: http-streamer-a
    spec:
      # Ensure this pod runs ONLY on your main ROV Pi
      nodeSelector:
        ros2-hardware: rov-main
      containers:
      - name: http-streamer-a-container
        image: zkinhang/manta-ray-ros:latest
        # This assumes 'httpStreamer' was built and copied to /usr/local/bin
        args: ["httpStreamer"]
        # command: ["/bin/bash", "-c", "--"]
        # args: ["while true; do sleep 30; done;"]
        securityContext:
          privileged: true
        volumeMounts:
        - name: camera-device
          mountPath: /dev/video1
      volumes:
      - name: camera-device
        hostPath:
          path: /dev/video1
