apiVersion: apps/v1
kind: Deployment
metadata:
  name: thrusterboard-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thrusterboard
  template:
    metadata:
      labels:
        app: thrusterboard
    spec:
      # Ensure this pod runs ONLY on the robot hardware
      nodeSelector:
        ros2-hardware: rov-main
      # Use host networking for ROS 2 DDS discovery
      hostNetwork: true
      hostIPC: true
      # Define the shared serial port device from the host
      volumes:
      - name: serial-port
        hostPath:
          path: /dev
      # Define a single container to run the launch file
      containers:
      - name: thrusterboard-container
        image: zkinhang/manta-ray-ros:latest
        command: ["/bin/bash", "-c", "--"]
        # args: ["while true; do sleep 30; done;"]
        # args: ["ros2 launch /ros2_ws/src/launch_file/launch_thruster.py"]
        args:
          - >
            source install/setup.bash && 
            ros2 launch /ros2_ws/src/launch_file/launch_thruster.py
        # Grant privileges to access host hardware
        securityContext:
          privileged: true
        # Mount the shared serial port into this container
        volumeMounts:
        - name: serial-port
          mountPath: /dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
