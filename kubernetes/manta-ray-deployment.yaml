  template:
    metadata:
      labels:
        app: pid-system
    spec:
      volumes:
      - name: dev-input
        hostPath:
          path: /dev/imu
      # Assuming this pod runs on your main PC
      nodeSelector:
        ros2-hardware: rov-main
      # Use host networking for ROS 2 DDS discovery
      hostNetwork: true
      hostIPC: true
      containers:
      - name: pid-system-container
        # Replace with your actual ROS 2 Docker image
        image: zkinhang/manta-ray-ros:latest
        volumeMounts:
        - name: dev-input
          mountPath: /dev/imu
        securityContext:
          privileged: true
        # This combines all your tmux send-keys commands into one shell script
        args: ["ros2", "run", "control_system_pkg", "pid_system_node"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: microros-agent-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: microros-agent
  template:
    metadata:
      labels:
        app: microros-agent
    spec:
      # Ensure this pod runs on the node where the microcontroller is plugged in
      nodeSelector:
        ros2-hardware: rov-camera
      # Use host networking for ROS 2 DDS discovery
      hostNetwork: true
      hostIPC: true
      # Define the shared serial port device from the host
      volumes:
      - name: serial-port-agent
        hostPath:
          path: /dev
      containers:
      - name: microros-agent-container
        image: zkinhang/microros-with-esptool:0.1
        imagePullPolicy: Always
        # Grant privileges to access host hardware and run chmod
        securityContext:
          privileged: true
        # Mount the shared serial port into this container
        volumeMounts:
        - name: serial-port-agent
          mountPath: /dev
        command: ["/bin/bash", "-c"]
        # # sleep command to test
        # args: ["while true; do sleep 30; done;"]
        args:
          - >
            source install/setup.bash && 
            echo "Setting permissions for /dev/ttyUSB0..." && 
            chmod 777 /dev/ttyUSB0 && 
            echo "Running esptool..." &&
            esptool --port /dev/ttyUSB0 run && 
            echo "Starting Micro-ROS Agent..." &&
            ros2 run micro_ros_agent micro_ros_agent serial --dev /dev/ttyUSB0