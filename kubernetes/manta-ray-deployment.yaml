apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-image-getter-a-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-image-getter-a
  template:
    metadata:
      labels:
        app: http-image-getter-a
    spec:
      securityContext:
        runAsUser: 1000  # <-- Replace with your UID
        runAsGroup: 1000 # <-- Replace with your GID
      nodeSelector:
        ros2-hardware: land-pc
      containers:
      - name: http-image-getter-a-container
        image: zkinhang/manta-ray-ros:latest
        args: ["httpGetImage"]
        # Grant privileges to access host devices
        env:
        - name: DISPLAY
          value: ":0"
        - name: XAUTHORITY
          value: "/root/.Xauthority"
        securityContext:
          privileged: true
        volumeMounts:
        - name: x11-forwarding
          mountPath: /tmp/.X11-unix
        - name: dev-dri
          mountPath: /dev/dri
        - name: xauthority
          mountPath: /root/.Xauthority
      volumes:
      - name: x11-forwarding
        hostPath:
          path: /tmp/.X11-unix
      - name: dev-dri
        hostPath:
          path: /dev/dri
      - name: xauthority
        hostPath:
          path: /home/edwin/.Xauthority
---
