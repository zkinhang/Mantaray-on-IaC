# manta-ray-deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: controller
  template:
    metadata:
      labels:
        app: controller
    spec:
      # Use host networking for ROS 2 discovery
      hostNetwork: true
      hostIPC: true
      # Ensure this pod runs ONLY on the PC
      nodeSelector:
        ros2-hardware: land-pc
      containers:
      - name: controller-container
        image: zkinhang/manta-ray-ros:latest
        args: ["ros2", "run", "controller_pkg", "joystick_reader"]
        # Grant privileges to access host devices
        securityContext:
          privileged: true
        volumeMounts:
        - name: dev-input
          mountPath: /dev/input
      volumes:
      - name: dev-input
        hostPath:
          path: /dev/input
---
