---
# -----------------------------------------------------------------------------
# STEP 0: INITIALIZE VARIABLES
# -----------------------------------------------------------------------------
- name: 0. Initialize Network Configuration
  hosts: all_nodes
  gather_facts: false
  vars_files:
    - vars/infra-vars.yaml
  tasks:
    - name: Resolve IP and Interface
      set_fact:
        target_ip: "{{ ansible_k3s_server_ip | default(ansible_k3s_agent_ip) }}"
        target_iface: "{{ node_interface_map[inventory_hostname][connection_mode] }}"

    - name: Set Connection Facts
      set_fact:
        ansible_host: "{{ target_ip }}"
        ansible_k3s_ip: "{{ target_ip }}"

# -----------------------------------------------------------------------------
# STEP 1: HOSTS FILE UPDATE
# -----------------------------------------------------------------------------
- name: 1. Update System-wide DNS (Hosts File)
  hosts: all_nodes
  become: yes
  gather_facts: yes
  vars_files:
    - vars/infra-vars.yaml
  tasks:
    - name: Disable manage_etc_hosts in cloud-init
      lineinfile:
        path: /etc/cloud/cloud.cfg
        regexp: '^\s*manage_etc_hosts:.*'
        line: "manage_etc_hosts: false"
        state: present
      ignore_errors: yes

    - name: Comment out update_etc_hosts module in cloud.cfg
      replace:
        path: /etc/cloud/cloud.cfg
        regexp: '^\s*-\s*update_etc_hosts'
        replace: ' # - update_etc_hosts'
      ignore_errors: yes

    - name: Update /etc/hosts to resolve cluster nodes locally
      lineinfile:
        path: /etc/hosts
        regexp: "^.*{{ item }}(\\s|$)"
        # We use hostvars to look up the IP of other nodes
        line: "{{ hostvars[item]['ansible_k3s_server_ip'] | default(hostvars[item]['ansible_k3s_agent_ip']) }} {{ item }} {{ item | regex_replace('\\..*$', '') }}"
        state: present
      loop: "{{ groups['all_nodes'] }}"

# -----------------------------------------------------------------------------
# STEP 2: SERVER RECONFIGURATION (MUST BE FIRST)
# -----------------------------------------------------------------------------
- name: 2. Reconfigure K3s Server for New Network
  hosts: k3s_server
  become: yes
  vars_files:
    - vars/infra-vars.yaml
  tasks:

    # 1. STOP EVERYTHING
    - name: Kill all K3s processes (Force Cleanup)
      command: /usr/local/bin/k3s-killall.sh
      ignore_errors: yes

    # 2. WIPE THE DATABASE
    - name: Reset K3s State (Fix etcd IP and Certs)
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/lib/rancher/k3s/server/db
        - /var/lib/rancher/k3s/server/tls

    # 3. UPDATE CONFIG
    - name: Remove old K3s Server Config blocks
      blockinfile:
        path: "{{ k3s_config_dir }}/config.yaml"
        state: absent
        marker: "# {mark} ANSIBLE MANAGED K3S SERVER NETWORKING"

    - name: Update K3s Server Config
      blockinfile:
        path: "{{ k3s_config_dir }}/config.yaml"
        create: yes
        marker: "# {mark} ANSIBLE MANAGED K3S NETWORKING"
        block: |
          node-ip: "{{ target_ip }}"
          flannel-iface: "{{ target_iface }}"
          bind-address: "{{ target_ip }}"
          advertise-address: "{{ target_ip }}"
          tls-san:
            - "{{ target_ip }}"
            - "{{ inventory_hostname }}"

    - name: Update registries.yaml
      copy:
        dest: "{{ k3s_config_dir }}/registries.yaml"
        mode: '0600'
        content: |
          mirrors:
            "{{ inventory_hostname }}:5000":
              endpoint:
                - "http://{{ inventory_hostname }}:5000"
            "{{ target_ip }}:5000":
              endpoint:
                - "http://{{ target_ip }}:5000"
          configs:
            "{{ inventory_hostname }}:5000":
              tls:
                insecure_skip_verify: true
            "{{ target_ip }}:5000":
              tls:
                insecure_skip_verify: true

    - name: Start K3s Server
      systemd:
        name: k3s
        state: started
        daemon_reload: yes

    # 5. WAIT FOR STABILITY
    - name: Wait for K3s API to be fully ready
      shell: "kubectl get nodes | grep -w 'Ready'"
      register: kubectl_ready
      until: kubectl_ready.rc == 0
      retries: 60
      delay: 5
      changed_when: false

    - name: Wait for K3s Node Token to be generated
      wait_for:
        path: /var/lib/rancher/k3s/server/node-token

    - name: Fetch K3s Node Token
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token_base64

    - name: Decode Token
      set_fact:
        fresh_k3s_token: "{{ k3s_token_base64.content | b64decode | trim }}"

# -----------------------------------------------------------------------------
# STEP 3: AGENT RECONFIGURATION
# -----------------------------------------------------------------------------
- name: 3. Reconfigure K3s Agents for New Network
  hosts: k3s_agents
  become: yes
  vars_files:
    - vars/infra-vars.yaml
  vars:
    master_host: "{{ groups['k3s_server'][0] }}"
    master_ip: "{{ hostvars[groups['k3s_server'][0]]['ansible_k3s_server_ip'] }}"
    real_token: "{{ hostvars[groups['k3s_server'][0]]['fresh_k3s_token'] }}"
  
  tasks:
    - name: Stop K3s Agent
      systemd:
        name: k3s-agent
        state: stopped

    - name: Wipe All Agent Identity Files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/lib/rancher/k3s/agent/client-ca.crt
        - /var/lib/rancher/k3s/agent/server-ca.crt
        - /var/lib/rancher/k3s/agent/token
        - /var/lib/rancher/k3s/agent/kubelet.kubeconfig
        - /etc/rancher/k3s/k3s.yaml # Just in case

    - name: Clean up old CNI interfaces (Reset Networking)
      shell: |
        ip link delete cni0 || true
        ip link delete flannel.1 || true
        rm -rf /var/lib/rancher/k3s/agent/etc/cni/net.d/*
      ignore_errors: yes

    # CLEANUP: Remove old inconsistent blocks
    - name: Update registries.yaml on Agent
      copy:
        dest: "{{ k3s_config_dir }}/registries.yaml"
        mode: '0600'
        # We configure the agent to trust the MASTER'S registry
        content: |
          mirrors:
            "{{ master_host }}:5000":
              endpoint:
                - "http://{{ master_host }}:5000"
            "{{ master_ip }}:5000":
              endpoint:
                - "http://{{ master_ip }}:5000"
          configs:
            "{{ master_host }}:5000":
              tls:
                insecure_skip_verify: true
            "{{ master_ip }}:5000":
              tls:
                insecure_skip_verify: true

    - name: Remove old K3s Agent Config blocks
      blockinfile:
        path: "{{ k3s_config_dir }}/config.yaml"
        marker: "# {mark} ANSIBLE MANAGED K3S AGENT NETWORKING"
        state: absent

    - name: Update K3s Config (config.yaml)
      blockinfile:
        path: "{{ k3s_config_dir }}/config.yaml"
        create: yes
        marker: "# {mark} ANSIBLE MANAGED K3S NETWORKING"
        block: |
          node-ip: "{{ target_ip }}"
          flannel-iface: "{{ target_iface }}"
          server: "https://{{ hostvars[master_host]['ansible_k3s_server_ip'] }}:6443" 
          token: "{{ real_token }}"

    - name: Update K3S_URL and K3S_TOKEN in service env
      blockinfile:
        path: /etc/systemd/system/k3s-agent.service.env
        create: yes
        marker: "# {mark} ANSIBLE MANAGED NETWORK SETTINGS"
        block: |
          K3S_URL=https://{{ master_ip }}:6443
          K3S_TOKEN={{ real_token }}

    - name: Force sync OS time with Ansible Control Node
      ansible.builtin.command: "date -s {{ lookup('pipe', 'date +%Y-%m-%dT%H:%M:%S') }}"
      become: true

    - name: Start K3s Agent
      systemd:
        name: k3s-agent
        state: started
        daemon_reload: yes
# -----------------------------------------------------------------------------
# STEP 4: LABELS
# -----------------------------------------------------------------------------
- name: 4. Restore Node Labels and Annotations
  hosts: k3s_server
  become: yes
  vars_files:
    - vars/infra-vars.yaml
  tasks:
    - name: Wait for all cluster nodes to be Ready
      shell: "kubectl get nodes --no-headers | grep -w 'Ready' | wc -l"
      register: ready_nodes_count
      until: ready_nodes_count.stdout | int == groups['all_nodes'] | length
      retries: 60
      delay: 5
      changed_when: false

    - name: Apply Hardware Labels
      command: >
        kubectl label node {{ item | regex_replace('\.local$', '') }} 
        ros2-hardware={{ default_node_labels[item] }} 
        --overwrite
      loop: "{{ groups['all_nodes'] }}"
      tags: labels

    - name: Annotate nodes with current IP
      command: >
        kubectl annotate node {{ item | regex_replace('\.local$', '') }} 
        ros2-node-ip={{ hostvars[item]['ansible_k3s_server_ip'] | default(hostvars[item]['ansible_k3s_agent_ip']) }} 
        --overwrite
      loop: "{{ groups['all_nodes'] }}"
      tags: labels