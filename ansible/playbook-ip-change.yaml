---
- name: Fix K3s Networking and Re-apply Labels
  hosts: k3s_agents
  become: yes

  vars:
    # Identify the Master Node for kubectl delegation
    master_host: "{{ groups['k3s_server'][0] }}"

  pre_tasks:
    # ---------------------------------------------------------
    # 1. USER PROVIDED VARIABLE LOADING (Scope: Agents)
    # ---------------------------------------------------------
    - name: Load deployment variables
      include_vars:
        file: vars/infra-vars.yaml
        name: infra_config

    - name: Set global facts for hosts
      set_fact:
        k3s_setup_dir: "{{ infra_config.k3s_setup_dir | default('../k3s-setup') }}"
        k3s_config_dir: "{{ infra_config.k3s_config_dir | default('/etc/rancher/k3s') }}"
        k3s_data_dir: "{{ infra_config.k3s_data_dir | default('/var/lib/rancher/k3s') }}"
        k3s_bin_dir: "{{ infra_config.k3s_bin_dir | default('/usr/local/bin') }}"
        docker_config_dir: "{{ infra_config.docker_config_dir | default('/etc/docker') }}"
        registry_data_dir: "{{ infra_config.registry_data_dir | default('/opt/local-registry') }}"
        registry_port: "{{ infra_config.registry_port | default('5000') }}"
        kube_config_dir: "{{ infra_config.kube_config_dir | default('.kube') }}"
        # Use defaults if not found in infra_config
        default_labels: "{{ infra_config.default_node_labels | default({
            'mantaray.local': 'land-pc',
            'rov-cam.local': 'rov-main',
            'rov.local': 'rov-camera'
          }) }}"
        # Extract the interface map from infra_config so we can use it easily
        node_interface_map: "{{ infra_config.node_interface_map }}"
        cacheable: true

    # ---------------------------------------------------------
    # 2. CALCULATE DYNAMIC FACTS (Dependent on vars above)
    # ---------------------------------------------------------
    - name: Calculate Network Targets
      set_fact:
        # Clean the Node Name (rov.local -> rov)
        k3s_node_name: "{{ inventory_hostname | regex_replace('\\.local$', '') }}"
        
        # Determine the Target IP (Inventory priority -> Host priority)
        target_ip: "{{ hostvars[inventory_hostname]['ansible_k3s_agent_ip'] | default(ansible_host) }}"
        
        # Look up the Interface Name using the map loaded above
        target_iface: "{{ node_interface_map[inventory_hostname][connection_mode] }}"

        # Determine desired ros2-hardware label
        my_node_label: "{{ hostvars[inventory_hostname]['ros2_hardware_label'] | default(default_labels[inventory_hostname] | default('')) }}"

    - name: Debug Calculated Settings
      debug:
        msg: 
          - "Node: {{ k3s_node_name }}"
          - "Mode: {{ connection_mode }}"
          - "Interface: {{ target_iface }}"
          - "Label: {{ my_node_label }}"

  tasks:
    # ---------------------------------------------------------
    # 3. NETWORK CLEANUP (Agent Side)
    # ---------------------------------------------------------
    - name: Remove Wi-Fi default route (if exists)
      command: ip route del default dev {{ node_interface_map[inventory_hostname]['wlan'] }}
      ignore_errors: yes
      when: connection_mode == "eth"
      tags: network

    - name: Stop K3s Agent
      systemd:
        name: k3s-agent
        state: stopped

    - name: Reset CNI Network Interfaces (cni0)
      command: ip link delete cni0
      ignore_errors: yes
      tags: cni

    - name: Reset Flannel Interface (flannel.1)
      command: ip link delete flannel.1
      ignore_errors: yes
      tags: cni

    - name: Remove stale CNI configs
      file:
        path: "{{ k3s_data_dir }}/agent/etc/cni/net.d/"
        state: absent
      tags: cni

    # ---------------------------------------------------------
    # 4. CONFIGURATION FIXES (Agent Side)
    # ---------------------------------------------------------
    - name: "Update {{ k3s_config_dir }}/config.yaml for {{ connection_mode }} mode"
      blockinfile:
        path: "{{ k3s_config_dir }}/config.yaml"
        create: yes
        marker: "# {mark} ANSIBLE MANAGED K3S NETWORKING"
        block: |
          node-ip: "{{ target_ip }}"
          flannel-iface: "{{ target_iface }}"
      tags: config

    - name: Fix systemd service (Remove conflicting --node-ip args)
      replace:
        path: /etc/systemd/system/k3s-agent.service
        regexp: '--node-ip\s+[0-9\.,]+'
        replace: ''
      tags: config

    # ---------------------------------------------------------
    # 5. SERVER SIDE ACTIONS (Delegate to Mantaray)
    # ---------------------------------------------------------
    - name: Delete node object on Master to force re-registration
      command: "kubectl delete node {{ k3s_node_name }}"
      delegate_to: "{{ master_host }}"
      ignore_errors: yes 
      tags: master_action

    # ---------------------------------------------------------
    # 6. RESTART AGENT
    # ---------------------------------------------------------
    - name: Force systemd reload and Start Agent
      systemd:
        daemon_reload: yes
        name: k3s-agent
        state: restarted
        enabled: yes

    # ---------------------------------------------------------
    # 7. APPLY LABELS (Delegate to Mantaray)
    # ---------------------------------------------------------
    - name: Wait for node to register with Master
      command: "kubectl get node {{ k3s_node_name }}"
      delegate_to: "{{ master_host }}"
      register: node_check
      until: node_check.rc == 0
      retries: 30
      delay: 4
      tags: labeling

    - name: Apply ros2-hardware label
      command: "kubectl label node {{ k3s_node_name }} ros2-hardware={{ my_node_label }} --overwrite"
      delegate_to: "{{ master_host }}"
      when: my_node_label | length > 0
      tags: labeling
      
    - name: Annotate node with correct IP
      command: "kubectl annotate node {{ k3s_node_name }} ros2-node-ip={{ target_ip }} --overwrite"
      delegate_to: "{{ master_host }}"
      tags: labeling