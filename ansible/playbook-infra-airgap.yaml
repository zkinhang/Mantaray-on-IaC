- name: Load configuration variables
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Load deployment variables
      include_vars:
        file: vars/infra-vars.yaml
        name: infra_config

    - name: Set global facts for all hosts
      set_fact:
        k3s_setup_dir: "{{ infra_config.k3s_setup_dir | default('../k3s-setup') }}"
        k3s_config_dir: "{{ infra_config.k3s_config_dir | default('/etc/rancher/k3s') }}"
        k3s_data_dir: "{{ infra_config.k3s_data_dir | default('/var/lib/rancher/k3s') }}"
        k3s_bin_dir: "{{ infra_config.k3s_bin_dir | default('/usr/local/bin') }}"
        docker_config_dir: "{{ infra_config.docker_config_dir | default('/etc/docker') }}"
        registry_data_dir: "{{ infra_config.registry_data_dir | default('/opt/local-registry') }}"
        registry_port: "{{ infra_config.registry_port | default('5000') }}"
        kube_config_dir: "{{ infra_config.kube_config_dir | default('.kube') }}"
        default_labels: "{{ infra_config.default_node_labels | default({
            'mantaray.local': 'land-pc',
            'rov-cam.local': 'rov-main',
            'rov.local': 'rov-camera'
          }) }}"
        cacheable: true
      delegate_to: localhost
      delegate_facts: true
      run_once: true

- name: Configure core networking and DNS
  hosts: all_nodes
  become: true
  gather_facts: true
  vars:
    k3s_server_host: "{{ groups['k3s_server'][0] }}"
    k3s_server_ip: "{{ hostvars[k3s_server_host]['ansible_k3s_server_ip']
                       | default(hostvars[k3s_server_host]['ansible_host']
                       | default(hostvars[k3s_server_host]['ansible_default_ipv4']['address']
                       | default('127.0.0.1'))) }}"
    k3s_config_dir: "{{ hostvars['localhost']['k3s_config_dir'] }}"
    k3s_data_dir: "{{ hostvars['localhost']['k3s_data_dir'] }}"
    docker_config_dir: "{{ hostvars['localhost']['docker_config_dir'] }}"
  tasks:
    - name: Ensure cluster hosts resolve locally
      lineinfile:
        path: /etc/hosts
        line: "{{ host_ip }} {{ item }} {{ item | regex_replace('\\..*$', '') }}"
        regexp: "^.*{{ item }}(\\s|$)"
        state: present
      vars:
        host_ip: "{{ hostvars[item]['ansible_k3s_server_ip']
                     | default(hostvars[item]['ansible_k3s_agent_ip']
                     | default(hostvars[item]['ansible_host']
                     | default(hostvars[item]['ansible_default_ipv4']['address']
                     | default('')))) }}"
      loop: "{{ groups['all_nodes'] }}"
      when: host_ip | length > 0

    - name: Ensure base directories exist for container runtimes
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ docker_config_dir }}"
        - "{{ k3s_config_dir }}"
        - "{{ k3s_data_dir }}/agent/images"

- name: Uninstall existing K3s if force reinstall enabled
  hosts: all_nodes
  become: true
  gather_facts: false
  vars:
    k3s_bin_dir: "{{ hostvars['localhost']['k3s_bin_dir'] }}"
    k3s_master_node: "{{ groups['k3s_server'][0] }}"
  tasks:
    - name: Clean up old node registrations from Master
      shell: |
        if command -v kubectl >/dev/null 2>&1; then
          kubectl delete node {{ inventory_hostname }} --ignore-not-found=true
        fi
      delegate_to: "{{ k3s_master_node }}"
      when:
        - (force_k3s_reinstall | default(false)) | bool
        - inventory_hostname in groups['k3s_agents']
        # Only run if the master node is reachable/configured
        - hostvars[k3s_master_node]['ansible_host'] is defined
      ignore_errors: true
    - name: Detect existing K3s server uninstall script
      stat:
        path: "{{ k3s_bin_dir }}/k3s-uninstall.sh"
      register: k3s_server_uninstall_script
      when: inventory_hostname in groups['k3s_server']

    - name: Detect existing K3s agent uninstall script
      stat:
        path: "{{ k3s_bin_dir }}/k3s-agent-uninstall.sh"
      register: k3s_agent_uninstall_script
      when: inventory_hostname in groups['k3s_agents']

    - name: Remove existing K3s server (if reinstall forced)
      command: "{{ k3s_bin_dir }}/k3s-uninstall.sh"
      when:
        - (force_k3s_reinstall | default(false)) | bool
        - inventory_hostname in groups['k3s_server']
        - k3s_server_uninstall_script.stat.exists

    - name: Clean up stale CNI network interfaces
      shell: |
        ip link delete cni0 || true
        ip link delete flannel.1 || true
      become: true
      when: (force_k3s_reinstall | default(false)) | bool

    - name: Remove existing K3s agent (if reinstall forced)
      command: "{{ k3s_bin_dir }}/k3s-agent-uninstall.sh"
      when:
        - (force_k3s_reinstall | default(false)) | bool
        - inventory_hostname in groups['k3s_agents']
        - k3s_agent_uninstall_script.stat.exists

    - name: Wait for cleanup to complete
      pause:
        seconds: 5
      when: (force_k3s_reinstall | default(false)) | bool

- name: Prepare k3s files for air-gapped installation
  hosts: localhost
  gather_facts: false
  become: true
  vars:
    k3s_setup_dir: "{{ hostvars['localhost']['k3s_setup_dir'] }}"
  tasks:
    - name: Verify k3s-setup directory exists
      stat:
        path: "{{ k3s_setup_dir }}"
      register: k3s_setup_stat
      failed_when: not k3s_setup_stat.stat.exists
      become: false
      when: (force_k3s_reinstall | default(false)) | bool

    - name: Make k3s files executable
      file:
        path: "{{ item }}"
        mode: '0755'
      loop:
        - "{{ k3s_setup_dir }}/install.sh"
        - "{{ k3s_setup_dir }}/files/k3s-arm64"
        - "{{ k3s_setup_dir }}/files/k3s"
      when: (force_k3s_reinstall | default(false)) | bool

- name: Install k3s server (air-gapped)
  hosts: k3s_server
  become: true
  gather_facts: true
  vars:
    k3s_setup_dir: "{{ hostvars['localhost']['k3s_setup_dir'] }}"
    k3s_bin_dir: "{{ hostvars['localhost']['k3s_bin_dir'] }}"
    k3s_data_dir: "{{ hostvars['localhost']['k3s_data_dir'] }}"
    k3s_config_dir: "{{ hostvars['localhost']['k3s_config_dir'] }}"
  tasks:
    - name: Detect server architecture
      command: uname -m
      register: server_arch
      changed_when: false

    - name: Set k3s binary and images based on architecture
      set_fact:
        k3s_binary: "{{ 'k3s-arm64' if 'aarch64' in server_arch.stdout else 'k3s' }}"
        k3s_images: "{{ 'k3s-airgap-images-arm64.tar.zst' if 'aarch64' in server_arch.stdout else 'k3s-airgap-images-amd64.tar.zst' }}"
      when: (force_k3s_reinstall | default(false)) | bool

    - name: Copy k3s binary to server
      copy:
        src: "{{ k3s_setup_dir }}/files/{{ k3s_binary }}"
        dest: "{{ k3s_bin_dir }}/k3s"
        mode: '0755'
      when: (force_k3s_reinstall | default(false)) | bool

    - name: Ensure k3s agent image directory exists
      ansible.builtin.file:
        path: "{{ k3s_data_dir }}/agent/images"
        state: directory
        mode: '0755'
        recurse: yes
      when: (force_k3s_reinstall | default(false)) | bool

    - name: Copy k3s airgap images to server
      copy:
        src: "{{ k3s_setup_dir }}/files/{{ k3s_images }}"
        dest: "{{ k3s_data_dir }}/agent/images/{{ k3s_images }}"
        mode: '0644'
      when: (force_k3s_reinstall | default(false)) | bool

    - name: Copy install script to server
      copy:
        src: "{{ k3s_setup_dir }}/install.sh"
        dest: /tmp/k3s-install.sh
        mode: '0755'
      when: (force_k3s_reinstall | default(false)) | bool

    - name: Install k3s server
      shell: /tmp/k3s-install.sh
      environment:
        INSTALL_K3S_SKIP_DOWNLOAD: "true"
        INSTALL_K3S_EXEC: "{{ install_k3s_exec | default('') }}"
      when: (force_k3s_reinstall | default(false)) | bool

    - name: Wait for k3s server to be ready
      wait_for:
        path: "{{ k3s_config_dir }}/k3s.yaml"
        timeout: 60

    - name: Determine advertised server IP
      set_fact:
        k3s_server_ip: "{{ ansible_k3s_server_ip | default(ansible_default_ipv4.address) }}"
        cacheable: true

    - name: Read K3s join token
      command: "cat {{ k3s_data_dir }}/server/node-token"
      register: join_token_result
      changed_when: false

    - name: Share K3s join token with other hosts
      set_fact:
        k3s_join_token: "{{ join_token_result.stdout }}"
        cacheable: true

    - name: Create .kube directory in user home
      file:
        path: "{{ ansible_user_dir }}/{{ hostvars['localhost']['kube_config_dir'] }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0700'

    - name: Copy K3s kubeconfig to user home directory
      copy:
        src: "{{ k3s_config_dir }}/k3s.yaml"
        dest: "{{ ansible_user_dir }}/{{ hostvars['localhost']['kube_config_dir'] }}/config"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'
        remote_src: true

    - name: Ensure kubeconfig ownership is correct
      file:
        path: "{{ ansible_user_dir }}/{{ hostvars['localhost']['kube_config_dir'] }}/config"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'
      become: true

    - name: Export KUBECONFIG for current user
      lineinfile:
        path: "{{ ansible_user_dir }}/.bashrc"
        line: "export KUBECONFIG=$HOME/{{ hostvars['localhost']['kube_config_dir'] }}/config"
        regexp: "^export KUBECONFIG="
        state: present

- name: Install k3s agents (air-gapped)
  hosts: k3s_agents
  become: true
  gather_facts: true
  vars:
    k3s_setup_dir: "{{ hostvars['localhost']['k3s_setup_dir'] }}"
    k3s_bin_dir: "{{ hostvars['localhost']['k3s_bin_dir'] }}"
    k3s_data_dir: "{{ hostvars['localhost']['k3s_data_dir'] }}"
    k3s_server_host: "{{ groups['k3s_server'][0] }}"
    k3s_server_ip: "{{ hostvars[k3s_server_host]['ansible_k3s_server_ip']
                       | default(hostvars[k3s_server_host]['k3s_server_ip']
                       | default(hostvars[k3s_server_host]['ansible_host']
                       | default(hostvars[k3s_server_host]['ansible_default_ipv4']['address']
                       | default('')))) }}"
    k3s_join_token: "{{ hostvars[k3s_server_host]['k3s_join_token'] }}"
  tasks:
    - name: Detect agent architecture
      command: uname -m
      register: agent_arch
      changed_when: false
      when: (force_k3s_reinstall | default(false)) | bool

    - name: Set k3s binary and images based on architecture
      set_fact:
        k3s_binary: "{{ 'k3s-arm64' if 'aarch64' in agent_arch.stdout else 'k3s' }}"
        k3s_images: "{{ 'k3s-airgap-images-arm64.tar.zst' if 'aarch64' in agent_arch.stdout else 'k3s-airgap-images-amd64.tar.zst' }}"
      when: (force_k3s_reinstall | default(false)) | bool

    - name: Create temporary k3s directory
      file:
        path: /tmp/k3s
        state: directory
        mode: '0755'
      when: (force_k3s_reinstall | default(false)) | bool

    - name: Copy k3s binary to agent
      copy:
        src: "{{ k3s_setup_dir }}/files/{{ k3s_binary }}"
        dest: /tmp/k3s/{{ k3s_binary }}
        mode: '0755'
      when: (force_k3s_reinstall | default(false)) | bool

    - name: Copy k3s airgap images to agent
      copy:
        src: "{{ k3s_setup_dir }}/files/{{ k3s_images }}"
        dest: /tmp/k3s/{{ k3s_images }}
        mode: '0644'
      when: (force_k3s_reinstall | default(false)) | bool

    - name: Copy install script to agent
      copy:
        src: "{{ k3s_setup_dir }}/install.sh"
        dest: /tmp/k3s/install.sh
        mode: '0755'
      when: (force_k3s_reinstall | default(false)) | bool

    - name: Move k3s binary to bin directory
      copy:
        src: /tmp/k3s/{{ k3s_binary }}
        dest: "{{ k3s_bin_dir }}/k3s"
        mode: '0755'
        remote_src: true
      when: (force_k3s_reinstall | default(false)) | bool

    - name: Ensure k3s agent image directory exists
      ansible.builtin.file:
        path: "{{ k3s_data_dir }}/agent/images"
        state: directory
        mode: '0755'
        recurse: yes
      when: (force_k3s_reinstall | default(false)) | bool

    - name: Move k3s airgap images to k3s directory
      copy:
        src: /tmp/k3s/{{ k3s_images }}
        dest: "{{ k3s_data_dir }}/agent/images/{{ k3s_images }}"
        mode: '0644'
        remote_src: true
      when: (force_k3s_reinstall | default(false)) | bool

    - name: Install k3s agent
      shell: /tmp/k3s/install.sh
      environment:
        INSTALL_K3S_SKIP_DOWNLOAD: "true"
        K3S_URL: "https://{{ k3s_server_ip }}:6443"
        K3S_TOKEN: "{{ k3s_join_token }}"
        INSTALL_K3S_EXEC: "--node-ip {{ hostvars[inventory_hostname]['ansible_host'] }}"
      when: (force_k3s_reinstall | default(false)) | bool

    - name: Clean up temporary files
      file:
        path: /tmp/k3s
        state: absent
      when: (force_k3s_reinstall | default(false)) | bool

- name: Configure container runtimes and local registry
  hosts: all_nodes
  become: true
  gather_facts: true
  vars:
    k3s_server_host: "{{ groups['k3s_server'][0] }}"
    k3s_server_ip: "{{ hostvars[k3s_server_host]['ansible_k3s_server_ip']
                       | default(hostvars[k3s_server_host]['ansible_host']
                       | default(hostvars[k3s_server_host]['ansible_default_ipv4']['address']
                       | default('127.0.0.1'))) }}"
    docker_config_dir: "{{ hostvars['localhost']['docker_config_dir'] }}"
    k3s_config_dir: "{{ hostvars['localhost']['k3s_config_dir'] }}"
    registry_port: "{{ hostvars['localhost']['registry_port'] }}"
  tasks:
    - name: Collect existing service facts
      service_facts:

    - name: Configure Docker to trust the local registry
      copy:
        dest: "{{ docker_config_dir }}/daemon.json"
        mode: '0644'
        content: |
          {
            "insecure-registries": [
              "{{ k3s_server_ip }}:{{ registry_port }}",
              "{{ k3s_server_host }}:{{ registry_port }}"
            ]
          }
      notify: Restart Docker

    - name: Configure K3s/containerd registry mirrors
      copy:
        dest: "{{ k3s_config_dir }}/registries.yaml"
        mode: '0644'
        content: |
          mirrors:
            "{{ k3s_server_host }}:{{ registry_port }}":
              endpoint:
                - "http://{{ k3s_server_host }}:{{ registry_port }}"
            "{{ k3s_server_ip }}:{{ registry_port }}":
              endpoint:
                - "http://{{ k3s_server_ip }}:{{ registry_port }}"
          configs:
            "{{ k3s_server_host }}:{{ registry_port }}":
              tls:
                insecure_skip_verify: true
            "{{ k3s_server_ip }}:{{ registry_port }}":
              tls:
                insecure_skip_verify: true
      notify:
        - Restart K3s Server
        - Restart K3s Agent

  handlers:
    - name: Restart Docker
      systemd:
        name: docker
        state: restarted
        daemon_reload: true
      timeout: 30
      ignore_errors: true
      when: "'docker.service' in ansible_facts.services"

    - name: Restart K3s Server
      systemd:
        name: k3s
        state: restarted
        daemon_reload: true
      timeout: 60
      ignore_errors: true
      when: inventory_hostname in groups['k3s_server']

    - name: Restart K3s Agent
      systemd:
        name: k3s-agent
        state: restarted
        daemon_reload: true
      timeout: 60
      ignore_errors: true
      when: inventory_hostname in groups['k3s_agents']

- name: Provision local Docker registry
  hosts: k3s_server
  become: true
  gather_facts: true
  vars:
    registry_data_dir: "{{ hostvars['localhost']['registry_data_dir'] }}"
    registry_port: "{{ hostvars['localhost']['registry_port'] }}"
  tasks:
    - name: Create directory for registry data
      file:
        path: "{{ registry_data_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        mode: '0755'

    - name: Ensure local registry container is running
      community.docker.docker_container:
        name: local-registry
        image: registry:2
        state: started
        restart_policy: always
        ports:
          - "{{ registry_port }}:5000"
        volumes:
          - "{{ registry_data_dir }}:/var/lib/registry"

- name: Normalize K3s node networking (works even without reinstall)
  hosts: all_nodes
  become: true
  gather_facts: true
  vars:
    k3s_config_dir: "{{ hostvars['localhost']['k3s_config_dir'] }}"
    
  tasks:
    - name: Collect existing service facts
      service_facts:

    # ---- Server: enforce node-ip + flannel-iface in config.yaml ----
    - name: Ensure k3s server config has stable node-ip and flannel iface
      blockinfile:
        path: "{{ k3s_config_dir }}/config.yaml"
        create: yes
        marker: "# {mark} ANSIBLE MANAGED K3S SERVER NETWORKING"
        block: |
          write-kubeconfig-mode: "0644"
          node-ip: "{{ hostvars[inventory_hostname]['ansible_k3s_server_ip']
                       | default(ansible_default_ipv4.address) }}"
          flannel-iface: "{{ ansible_default_ipv4.interface }}"
      when: inventory_hostname in groups['k3s_server']
      notify: Restart K3s

    # ---- Agent: enforce node-ip + flannel-iface in config.yaml ----
    - name: Ensure k3s agent config has stable node-ip and flannel iface
      blockinfile:
        path: "{{ k3s_config_dir }}/config.yaml"
        create: yes
        marker: "# {mark} ANSIBLE MANAGED K3S AGENT NETWORKING"
        block: |
          node-ip: "{{ hostvars[inventory_hostname]['ansible_k3s_agent_ip']
                       | default(ansible_default_ipv4.address) }}"
          flannel-iface: "{{ ansible_default_ipv4.interface }}"
      when: inventory_hostname in groups['k3s_agents']
      notify: Restart K3s

    # ---- Remove duplicate --node-ip from systemd unit files (if present) ----
    - name: Strip explicit --node-ip from k3s server systemd unit (avoid duplicates)
      replace:
        path: /etc/systemd/system/k3s.service
        regexp: '\s+--node-ip\s+\S+'
        replace: ''
      when:
        - inventory_hostname in groups['k3s_server']
        - "'k3s.service' in ansible_facts.services"
      notify: Restart K3s

    - name: Normalize k3s-agent ExecStart to simple form (no args)
      lineinfile:
        path: /etc/systemd/system/k3s-agent.service
        regexp: '^ExecStart='
        line: 'ExecStart=/usr/local/bin/k3s agent'
      when:
        - inventory_hostname in groups['k3s_agents']
        - "'k3s-agent.service' in ansible_facts.services"
      notify: Restart K3s

  handlers:
    - name: Restart K3s Server
      systemd:
        name: k3s
        state: restarted
        daemon_reload: true
      timeout: 60
      ignore_errors: true
      listen: Restart K3s
      when: inventory_hostname in groups['k3s_server']

    - name: Restart K3s Agent
      systemd:
        name: k3s-agent
        state: restarted
        daemon_reload: true
      timeout: 60
      ignore_errors: true
      listen: Restart K3s
      when: inventory_hostname in groups['k3s_agents']
        
- name: Label Kubernetes nodes based on inventory IPs
  hosts: k3s_server
  gather_facts: true
  vars:
    kubeconfig_path: "{{ ansible_user_dir }}/.kube/config"
    default_labels:
      mantaray.local: land-pc
      rov-cam.local: rov-main
      rov.local: rov-camera
  tasks:
    - name: Build node label map from inventory
      set_fact:
        node_label_map: "{{ node_label_map | default({}) | combine({ node_ip: node_label }) }}"
      vars:
        node_ip: "{{ hostvars[item]['ansible_k3s_server_ip']
                     | default(hostvars[item]['ansible_k3s_agent_ip']
                     | default(hostvars[item]['ansible_host']
                     | default(hostvars[item]['ansible_default_ipv4']['address']
                     | default('')))) }}"
        node_label: "{{ hostvars[item]['ros2_hardware_label'] | default(default_labels[item] | default('')) }}"
      loop: "{{ groups['all_nodes'] }}"
      run_once: true
      when: node_ip | length > 0 and node_label | length > 0

    - name: Collect Kubernetes node information
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        kind: Node
      register: cluster_nodes

    - name: Apply ros2-hardware labels based on IP
      vars:
        internal_ip: "{{ (item.status.addresses | selectattr('type', 'equalto', 'InternalIP') | map(attribute='address') | list | first) | default('') }}"
      when: internal_ip | length > 0 and internal_ip in node_label_map
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: patched
        kind: Node
        name: "{{ item.metadata.name }}"
        resource_definition:
          metadata:
            labels:
              ros2-hardware: "{{ node_label_map[internal_ip] }}"
              ros2-node-ip: "{{ internal_ip }}"
      loop: "{{ cluster_nodes.resources }}"