# Service for the pod on rov.local (http-image-getter-a)
apiVersion: v1
kind: Service
metadata:
  name: rov-streamer-service
spec:
  type: NodePort
  selector:
    # This must match the LABEL of the pod, not the deployment name
    app: http-streamer-a
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
---
# Service for the pod on rov-cam.local (http-image-getter-b)
apiVersion: v1
kind: Service
metadata:
  # Renamed for clarity
  name: rov-cam-streamer-service 
spec:
  type: NodePort
  selector:
    # This selector now points to your second streamer pod
    app: http-streamer-b
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000