# This play runs FIRST on the server to get its IP and token
- name: Provision K3s Server
  hosts: k3s_server
  become: true
  gather_facts: true
  tasks:
    - name: Install K3s Server
      shell: "curl -sfL https://get.k3s.io | sh -"
      args:
        creates: /usr/local/bin/k3s # Makes task idempotent

    - name: Store the server's IP address from gathered facts
      set_fact:
        # 'ansible_default_ipv4.address' is a variable discovered
        # by Ansible during the 'gather_facts' step.
        k3s_server_ip: "{{ ansible_default_ipv4.address }}"

    - name: Get the K3s join token
      command: "cat /var/lib/rancher/k3s/server/node-token"
      register: join_token_result
      changed_when: false

    - name: Store the join token
      set_fact:
        k3s_join_token: "{{ join_token_result.stdout }}"

# This play runs SECOND on the agents
- name: Provision K3s Agents
  hosts: k3s_agents
  become: true
  gather_facts: false # No need to gather facts on agents
  vars:
      # Load the variables from 'mantaray.local' (the host in the 'k3s_server' group)
      k3s_server_url: "https://{{ hostvars['mantaray.local']['k3s_server_ip'] }}:6443"
      k3s_join_token: "{{ hostvars['mantaray.local']['k3s_join_token'] }}"
  tasks:
    - name: Install K3s Agent
      shell: "curl -sfL https://get.k3s.io | K3S_URL={{ k3s_server_url }} K3S_TOKEN={{ k3s_join_token }} sh -"
      args:
        creates: /usr/local/bin/k3s-agent-uninstall.sh
    
# This play runs THIRD on your control machine to label the nodes
- name: Label Kubernetes Nodes
  hosts: k3s_server # Runs on the control machine (where kubectl is)
  gather_facts: false
  tasks:
    - name: Label all nodes with their hardware roles
      kubernetes.core.k8s:
        state: patched
        kind: Node
        name: "{{ item.name }}" # The node's hostname
        resource_definition:
              metadata:
                labels:
                  ros2-hardware: "{{ item.label }}"
      loop:
        # These 'name' fields MUST match the machine's actual hostname
        - { name: "mantaray", label: "land-pc" }
        - { name: "rov-cam",  label: "rov-main" }
        - { name: "rov",      label: "rov-camera" }