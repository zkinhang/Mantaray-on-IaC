[all:vars]
# This sets the default user for all hosts in this file
ansible_user=edwin
force_k3s_reinstall=false
# Change this to 'wlan' to revert everyone to Wi-Fi
connection_mode=wlan

# WebRTC tuning for main camera (HF901 on rov)
webrtc_main_width=1280
webrtc_main_height=720
webrtc_main_fps=30
webrtc_main_bitrate=2500
webrtc_main_key_int=30

# WebRTC tuning for aux camera (WSD-2836 on rov-cam)
webrtc_aux_width=640
webrtc_aux_height=480
webrtc_aux_fps=30
webrtc_aux_bitrate=900
webrtc_aux_key_int=30

[k3s_server]
# This host will use the default 'ansible_user=edwin'
# IP change detection: Update the IP when it changes. This will trigger a full cluster reinstall.
mantaray.local ansible_k3s_server_ip=192.168.1.141 ansible_host=192.168.1.141

[k3s_agents]
# These hosts override the default user
rov.local     ansible_user=EEC ansible_k3s_agent_ip=192.168.1.219 ansible_host=192.168.1.219
rov-cam.local ansible_user=EEC ansible_k3s_agent_ip=192.168.1.14 ansible_host=192.168.1.14

[k3s_agents:vars]
ansible_python_interpreter=/usr/bin/python3

[all_nodes:children]
k3s_server
k3s_agents