- name: Set up and Expose Kubernetes Dashboard
  hosts: localhost
  gather_facts: false

  vars:
    dashboard_manifests_dir: "k8s/cluster-services"
    token_save_path: "./dashboard-admin-token.txt"
    # We define a specific port
    dashboard_port: 30443

  tasks:
    - name: Apply all dashboard YAML definitions
      kubernetes.core.k8s:
        state: present
        src: "{{ item }}"
      loop: "{{ lookup('fileglob', dashboard_manifests_dir + '/*.yaml', wantlist=True) }}"

    - name: Patch dashboard service to use specific NodePort
      kubernetes.core.k8s:
        state: patched
        kind: Service
        name: kubernetes-dashboard
        namespace: kubernetes-dashboard
        definition:
          spec:
            type: NodePort
            ports:
              - port: 443
                targetPort: 8443
                nodePort: "{{ dashboard_port }}"

    - name: Pin Dashboard pods to Mantaray
      kubernetes.core.k8s:
        state: patched
        kind: Deployment
        name: "{{ item }}"
        namespace: kubernetes-dashboard
        definition:
          spec:
            template:
              spec:
                nodeSelector:
                  kubernetes.io/hostname: mantaray
      loop:
        - kubernetes-dashboard
        - dashboard-metrics-scraper

    - name: 3. Force a rolling update by annotating the Deployments
      kubernetes.core.k8s:
        state: patched
        kind: Deployment
        name: "{{ item }}"
        namespace: kubernetes-dashboard
        definition:
          spec:
            template:
              metadata:
                annotations:
                  # This annotation changes on every run, forcing a redeploy
                  ansible.com/force-redeploy: "{{ lookup('pipe', 'date -u +%FT%TZ') }}"
      loop:
        - kubernetes-dashboard
        - dashboard-metrics-scraper

    - name: Wait for the permanent token to be generated
      kubernetes.core.k8s_info:
        kind: Secret
        # Ensure your manifests create a secret named exactly this
        name: admin-user-permanent-token
        namespace: kubernetes-dashboard
      register: token_secret
      until: "token_secret.resources | length > 0 and token_secret.resources[0].data.token is defined"
      retries: 20
      delay: 5

    - name: Decode and save the token to a local file
      copy:
        content: "{{ token_secret.resources[0].data.token | b64decode }}"
        dest: "{{ token_save_path }}"
        mode: '0600'
      when: token_secret.resources | length > 0

    - name: Get Master IP
      shell: |
        kubectl get node mantaray -o jsonpath='{.status.addresses[?(@.type=="InternalIP")].address}'
      register: master_ip_output
      changed_when: false

    - name: Print access information
      debug:
        msg:
          - "Dashboard setup is complete!"
          - "------------------------------------------------------------------"
          - "1. Open this URL: https://{{ master_ip_output.stdout }}:{{ dashboard_port }}"
          - "2. Copy the token from: {{ token_save_path }}"
          - "------------------------------------------------------------------"
          - "NOTE: If Chrome says 'Your connection is not private' and creates a barrier:"
          - "      Click anywhere on the background of the warning page and type: thisisunsafe"